<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V10 MT5 Live Dashboard</title>
    <!-- Lightweight Charts CDN v3.8.0 -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar / AI Panel -->
        <aside class="ai-panel">
            <div class="logo">
                <span class="gradient-text">ANTIGRAVITY</span>
                <span class="version">V10 Live MT5 Data</span>
            </div>
            
            <div class="status-card">
                <h3>Connection Status</h3>
                <div class="status-indicator">
                    <span id="ws-dot" class="dot red"></span>
                    <span id="ws-text">Connecting...</span>
                </div>
                <div class="status-indicator">
                    <span id="mt5-dot" class="dot red"></span>
                    <span id="mt5-text">MT5 Stream Offline</span>
                </div>
            </div>

            <!-- Manual Engulfing Table -->
            <div class="status-card" style="margin-top:12px;">
                <h3>Manual Engulfings</h3>
                <table id="manual-table" style="width:100%; font-size:12px; color:#c8c8c8;">
                    <thead><tr><th style="text-align:left;padding:4px;">Time</th><th style="text-align:left;padding:4px;">Type</th><th style="text-align:left;padding:4px;">Price</th></tr></thead>
                    <tbody><tr class="empty-row"><td colspan="3" style="text-align:center; padding:10px; color:rgba(255,255,255,0.3);">Click candle to mark</td></tr></tbody>
                </table>
            </div>
        </aside>

        <!-- Main Chart Area -->
        <main class="chart-container">
            <header class="chart-header">
                <h2>XAUUSD (Gold) <span class="timeframe">1m</span></h2>
                <div class="header-right">
                    <button id="toggle-positions-btn" style="background:rgba(38,166,154,0.2);border:1px solid rgba(38,166,154,0.3);color:var(--text-secondary,#888);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Inter;">Positions</button>
                    <button id="pos-settings-btn" style="background:rgba(38,166,154,0.2);border:1px solid rgba(38,166,154,0.3);color:var(--text-secondary,#888);padding:4px 6px;border-radius:4px;cursor:pointer;font-size:11px;">&#9881;</button>
                    <div id="pos-settings-menu" style="display:none;position:absolute;right:10px;top:40px;background:#1a1d26;border:1px solid rgba(42,46,57,0.8);border-radius:6px;padding:8px 12px;z-index:100;font-size:12px;color:#c8c8c8;min-width:140px;">
                        <div style="font-weight:bold;color:#26a69a;margin-bottom:6px;border-bottom:1px solid rgba(38,166,154,0.3);padding-bottom:2px;">Positions</div>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-thick" checked> Thick border</label>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-outer" checked> Outer border</label>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-prices" checked> Show prices</label>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-dash" checked> Entry dash</label>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-rr15"> 1.5 R:R line</label>
                        
                        <div style="font-weight:bold;color:#FFC107;margin-top:10px;margin-bottom:6px;border-bottom:1px solid rgba(255,193,7,0.3);padding-bottom:2px;">Indicators</div>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-sma-line" checked> 200 SMA line</label>
                        <label style="display:block;margin:4px 0;cursor:pointer;"><input type="checkbox" id="set-sma-label" checked> 200 SMA label</label>
                    </div>
                    <div id="candle-countdown" class="countdown">00:00</div>
                    <div id="live-badge" class="live-pulse">LIVE</div>
                </div>
            </header>
            <div id="tvchart"></div>
        </main>
    </div>

    <script>
        try {
            // Live Badge & Timer Logic
            let lastMarketTime = Date.now();
            const countdownEl = document.getElementById('candle-countdown');
            const liveBadge = document.getElementById('live-badge');
            
            // 0. Countdown Timer
            setInterval(() => {
                const now = Date.now();
                // Since we are on a 1m chart, the candle closes 60s after its open time
                const candleCloseTime = lastMarketTime + 60000;
                let timeLeft = candleCloseTime - now;
                
                if (timeLeft < 0 || isMarketClosed()) {
                    countdownEl.innerText = `00:00`;
                } else {
                    const secondsLeft = Math.ceil(timeLeft / 1000);
                    countdownEl.innerText = `00:${secondsLeft.toString().padStart(2, '0')}`;
                }
            }, 1000);
            
            function isMarketClosed() {
                const now = new Date();
                const day = now.getUTCDay();
                const hour = now.getUTCHours();
                // Weekend
                if (day === 5 && hour >= 21) return true;
                if (day === 6) return true;
                if (day === 0 && hour < 21) return true;
                // Daily break
                if (hour === 21) return true; // 5 PM - 6 PM EST
                return false;
            }

            setInterval(() => {
                if (typeof ws === 'undefined' || ws.readyState !== WebSocket.OPEN) {
                    liveBadge.className = 'live-pulse offline';
                    liveBadge.innerText = 'OFFLINE';
                } else if (Date.now() - lastMarketTime > 60000) {
                    if (isMarketClosed()) {
                        liveBadge.className = 'live-pulse closed';
                        liveBadge.innerText = 'CLOSED';
                    } else {
                        liveBadge.className = 'live-pulse delayed';
                        liveBadge.innerText = 'DELAYED';
                    }
                } else {
                    liveBadge.className = 'live-pulse';
                    liveBadge.innerText = 'LIVE';
                }
            }, 1000);

            // 1. Initialize Chart
            const chartContainer = document.getElementById('tvchart');
            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: { background: { type: 'solid', color: '#0B0E14' }, textColor: '#d1d4dc', fontSize: 12, fontFamily: 'Inter' },
                grid: { vertLines: { color: 'rgba(42, 46, 57, 0.3)' }, horzLines: { color: 'rgba(42, 46, 57, 0.3)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(42, 46, 57, 0.5)' },
                timeScale: { borderColor: 'rgba(42, 46, 57, 0.5)', timeVisible: true, secondsVisible: false },
            });
            window.addEventListener('resize', () => { chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight }); });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderDownColor: '#ef5350', borderUpColor: '#26a69a',
                wickDownColor: '#ef5350', wickUpColor: '#26a69a',
            });

            const volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            const smaSeries = chart.addLineSeries({
                color: 'rgba(255, 193, 7, 0.8)', lineWidth: 2, title: '200 SMA',
                crosshairMarkerVisible: false, priceLineVisible: false
            });

            let markers = [];
            let allCandles = [];
            let manualSetups = [];
            let manualMarkers = [];
            const tzOffset = new Date().getTimezoneOffset() * 60;
            function toLocal(time) { return time - tzOffset; }

            // --- Manual Engulfing Functions ---
            function updateManualMarkers() {
                try {
                    if (!manualSetups.length || !allCandles.length) {
                        candleSeries.setMarkers([]);
                        manualMarkers = [];
                        updateManualTable([]);
                        return;
                    }
                    manualMarkers = manualSetups.map(m => {
                        const isBullish = m.c_close > m.c_open;
                        const entry = m.c_close;
                        let sl, tp;
                        if (isBullish) {
                            sl = m.b_low;
                            tp = entry + 2 * (entry - sl);
                        } else {
                            sl = m.b_high;
                            tp = entry - 2 * (sl - entry);
                        }
                        
                        let status = '';
                        let tradeEndTime = allCandles[allCandles.length - 1].time;
                        
                        const cIdx = allCandles.findIndex(c => c.time === m.c_time);
                        if (cIdx !== -1) {
                            for (let i = cIdx + 1; i < allCandles.length; i++) {
                                const cdl = allCandles[i];
                                if (isBullish) {
                                    if (cdl.low <= sl) { status = 'LOST'; tradeEndTime = cdl.time; break; }
                                    if (cdl.high >= tp) { status = 'WON'; tradeEndTime = cdl.time; break; }
                                } else {
                                    if (cdl.high >= sl) { status = 'LOST'; tradeEndTime = cdl.time; break; }
                                    if (cdl.low <= tp) { status = 'WON'; tradeEndTime = cdl.time; break; }
                                }
                            }
                        }
                        
                        let text = isBullish ? 'BUY' : 'SELL';
                        if (status === 'WON') text += ' ✅';
                        else if (status === 'LOST') text += ' ❌';
                        
                        return {
                            time: toLocal(m.c_time),
                            position: isBullish ? 'belowBar' : 'aboveBar',
                            color: '#FFD700',
                            shape: isBullish ? 'arrowUp' : 'arrowDown',
                            text: text,
                            isBullish: isBullish,
                            entry: entry,
                            sl: sl,
                            tp: tp,
                            endTimeLocal: toLocal(tradeEndTime)
                        };
                    });
                    
                    manualMarkers.sort((a, b) => a.time - b.time);
                    candleSeries.setMarkers(manualMarkers);
                    drawPositionBoxes();
                    updateManualTable(manualSetups);
                } catch(e) {
                    console.error('updateManualMarkers error:', e);
                }
            }

            function updateManualTable(data) {
                const tbody = document.querySelector('#manual-table tbody');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="3" style="text-align:center; padding:10px; color:rgba(255,255,255,0.3);">Click candle to mark</td></tr>';
                } else {
                    tbody.innerHTML = '';
                    const sorted = [...data].sort((a,b) => b.c_time - a.c_time);
                    sorted.forEach(m => {
                        const isBullish = m.c_close > m.c_open;
                        const typeText = isBullish ? '<span style="color:#26a69a; font-weight:bold;">BULL</span>' : '<span style="color:#ef5350; font-weight:bold;">BEAR</span>';
                        const dateStr = new Date(m.c_time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        tbody.innerHTML += `
                            <tr style="border-bottom: 1px solid rgba(42, 46, 57, 0.5);">
                                <td style="padding: 6px 4px;">${dateStr}</td>
                                <td style="padding: 6px 4px;">${typeText}</td>
                                <td style="padding: 6px 4px;">${m.c_close.toFixed(2)}</td>
                            </tr>
                        `;
                    });
                }
            }

            function optimisticToggle(a, b, c) {
                if (ws.readyState === WebSocket.OPEN) {
                    const existingIdx = manualSetups.findIndex(m => m.c_time === c.time);
                    if (existingIdx !== -1) {
                        manualSetups.splice(existingIdx, 1);
                    } else {
                        manualSetups.push({
                            c_time: c.time, c_open: c.open, c_high: c.high, c_low: c.low, c_close: c.close,
                            b_time: b.time, b_open: b.open, b_high: b.high, b_low: b.low, b_close: b.close,
                            a_time: a.time, a_open: a.open, a_high: a.high, a_low: a.low, a_close: a.close
                        });
                    }
                    updateManualMarkers();
                    
                    ws.send(JSON.stringify({
                        type: 'toggle_manual',
                        data: { a, b, c }
                    }));
                }
            }

            // --- Visual Trade Position Boxes ---
            let showPositions = false;
            
            const savedSettings = localStorage.getItem('posSettings');
            let posSettings = savedSettings ? JSON.parse(savedSettings) : {
                thick: true, outer: true, prices: true, dash: true, rr15: false, smaLine: true, smaLabel: true
            };
            
            if (posSettings.smaLine === undefined) posSettings.smaLine = true;
            if (posSettings.smaLabel === undefined) posSettings.smaLabel = posSettings.sma ?? true;
            
            ['thick', 'outer', 'prices', 'dash', 'rr15', 'sma-line', 'sma-label'].forEach(key => {
                const camelKey = key.replace(/-([a-z])/g, g => g[1].toUpperCase());
                const cb = document.getElementById('set-' + key);
                if (cb) cb.checked = posSettings[camelKey];
            });
            
            smaSeries.applyOptions({ 
                visible: posSettings.smaLine,
                lastValueVisible: posSettings.smaLabel,
                title: posSettings.smaLabel ? '200 SMA' : ''
            });
            
            const posBtn = document.getElementById('toggle-positions-btn');
            const posSettingsBtn = document.getElementById('pos-settings-btn');
            const posSettingsMenu = document.getElementById('pos-settings-menu');
            
            const tradeOverlay = document.createElement('div');
            tradeOverlay.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:3;overflow:hidden;';
            chartContainer.style.position = 'relative';
            chartContainer.appendChild(tradeOverlay);
            
            posBtn.addEventListener('click', () => {
                showPositions = !showPositions;
                posBtn.style.background = showPositions ? 'rgba(38,166,154,0.5)' : 'rgba(38,166,154,0.2)';
                posBtn.style.color = showPositions ? '#fff' : 'var(--text-secondary, #888)';
                drawPositionBoxes();
            });
            
            posSettingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                posSettingsMenu.style.display = posSettingsMenu.style.display === 'none' ? 'block' : 'none';
            });
            
            document.addEventListener('click', (e) => {
                if (!posSettingsMenu.contains(e.target) && e.target !== posSettingsBtn) {
                    posSettingsMenu.style.display = 'none';
                }
            });
            
            ['thick', 'outer', 'prices', 'dash', 'rr15', 'sma-line', 'sma-label'].forEach(key => {
                document.getElementById('set-' + key).addEventListener('change', (e) => {
                    const camelKey = key.replace(/-([a-z])/g, g => g[1].toUpperCase());
                    posSettings[camelKey] = e.target.checked;
                    localStorage.setItem('posSettings', JSON.stringify(posSettings));
                    
                    if (key === 'sma-line' || key === 'sma-label') {
                        smaSeries.applyOptions({ 
                            visible: posSettings.smaLine,
                            lastValueVisible: posSettings.smaLabel,
                            title: posSettings.smaLabel ? '200 SMA' : ''
                        });
                    } else {
                        drawPositionBoxes();
                    }
                });
            });
            
            function drawPositionBoxes() {
                if (!showPositions || !manualMarkers.length) {
                    tradeOverlay.innerHTML = '';
                    return;
                }
                
                let html = '';
                
                manualMarkers.forEach(m => {
                    const x1 = chart.timeScale().timeToCoordinate(m.time);
                    let x2 = chart.timeScale().timeToCoordinate(m.endTimeLocal);
                    
                    if (x1 === null) return;
                    if (x2 === null) x2 = chart.timeScale().width();
                    if (x2 <= x1) x2 = x1 + 20;
                    
                    const yEntry = candleSeries.priceToCoordinate(m.entry);
                    const yTP = candleSeries.priceToCoordinate(m.tp);
                    const ySL = candleSeries.priceToCoordinate(m.sl);
                    
                    if (yEntry === null || yTP === null || ySL === null) return;
                    
                    const w = x2 - x1;
                    
                    // TP box (green zone)
                    const tpTop = Math.min(yEntry, yTP);
                    const tpH = Math.abs(yEntry - yTP);
                    const thickTp = posSettings.thick ? 'border-left:3px solid #26a69a;' : '';
                    const borderTp = posSettings.outer ? 'border:1px solid rgba(38,166,154,0.5);' : '';
                    html += `<div style="position:absolute;left:${x1}px;top:${tpTop}px;width:${w}px;height:${tpH}px;background:rgba(38,166,154,0.18);${borderTp}${thickTp}box-sizing:border-box;"></div>`;
                    
                    if (posSettings.prices) {
                        html += `<div style="position:absolute;left:${x1+4}px;top:${Math.min(yEntry,yTP)+2}px;color:#26a69a;font-size:10px;font-weight:700;">TP ${m.tp.toFixed(2)}</div>`;
                    }
                    
                    // SL box (red zone)
                    const slTop = Math.min(yEntry, ySL);
                    const slH = Math.abs(yEntry - ySL);
                    const thickSl = posSettings.thick ? 'border-left:3px solid #ef5350;' : '';
                    const borderSl = posSettings.outer ? 'border:1px solid rgba(239,83,80,0.5);' : '';
                    html += `<div style="position:absolute;left:${x1}px;top:${slTop}px;width:${w}px;height:${slH}px;background:rgba(239,83,80,0.18);${borderSl}${thickSl}box-sizing:border-box;"></div>`;
                    
                    if (posSettings.prices) {
                        html += `<div style="position:absolute;left:${x1+4}px;top:${Math.max(yEntry,ySL)-14}px;color:#ef5350;font-size:10px;font-weight:700;">SL ${m.sl.toFixed(2)}</div>`;
                    }
                    
                    // Entry line
                    if (posSettings.dash) {
                        html += `<div style="position:absolute;left:${x1}px;top:${yEntry}px;width:${w}px;height:0;border-top:1px dashed #FFD700;"></div>`;
                    }
                    
                    if (posSettings.prices) {
                        html += `<div style="position:absolute;left:${x1+4}px;top:${yEntry-14}px;color:#FFD700;font-size:10px;font-weight:700;">${m.isBullish ? 'BUY' : 'SELL'} ${m.entry.toFixed(2)}</div>`;
                    }
                    
                    // 1:1.5 R:R Line
                    if (posSettings.rr15) {
                        const rr15Price = m.isBullish ? m.entry + 1.5 * (m.entry - m.sl) : m.entry - 1.5 * (m.sl - m.entry);
                        const yRR = candleSeries.priceToCoordinate(rr15Price);
                        if (yRR !== null && yRR >= Math.min(yTP, ySL) && yRR <= Math.max(yTP, ySL)) {
                            html += `<div style="position:absolute;left:${x1}px;top:${yRR}px;width:${w}px;height:0;border-top:1px dashed rgba(255,255,255,0.4);"></div>`;
                            if (posSettings.prices) {
                                html += `<div style="position:absolute;left:${x1+4}px;top:${yRR+2}px;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;">1.5 R:R (${rr15Price.toFixed(2)})</div>`;
                            }
                        }
                    }
                });
                
                tradeOverlay.innerHTML = html;
            }
            
            // Sync boxes with chart pan/zoom
            chart.timeScale().subscribeVisibleTimeRangeChange(drawPositionBoxes);
            chart.timeScale().subscribeVisibleLogicalRangeChange(drawPositionBoxes);
            
            chart.subscribeClick((param) => {
                if (!param.time) return;
                const dbTime = param.time + tzOffset;
                
                const cIdx = allCandles.findIndex(c => c.time === dbTime);
                if (cIdx >= 2) {
                    optimisticToggle(allCandles[cIdx-2], allCandles[cIdx-1], allCandles[cIdx]);
                }
            });

            // 2. WebSocket Connection
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);

            const wsDot = document.getElementById('ws-dot');
            const wsText = document.getElementById('ws-text');
            const mt5Dot = document.getElementById('mt5-dot');
            const mt5Text = document.getElementById('mt5-text');

            ws.onopen = () => {
                wsDot.className = 'dot green';
                wsText.innerText = 'Connected';
            };

            ws.onclose = () => {
                wsDot.className = 'dot red';
                wsText.innerText = 'Disconnected';
                mt5Dot.className = 'dot red';
                mt5Text.innerText = 'MT5 Stream Offline';
            };

            ws.onerror = (err) => {
                console.error("WS Error:", err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'history') {
                        if (msg.data && msg.data.length > 0) {
                            lastMarketTime = msg.data[msg.data.length - 1].time * 1000;
                        }
                        const localHistory = msg.data.map(d => ({...d, time: d.time - tzOffset}));
                        candleSeries.setData(localHistory);
                        allCandles = msg.data.map(d => ({...d}));
                        
                        const smaData = [];
                        for (let i = 199; i < localHistory.length; i++) {
                            let sum = 0;
                            for (let j = 0; j < 200; j++) {
                                sum += localHistory[i - j].close;
                            }
                            smaData.push({ time: localHistory[i].time, value: sum / 200 });
                        }
                        smaSeries.setData(smaData);
                        
                        const volumeData = msg.data.map(d => ({
                            time: d.time - tzOffset,
                            value: d.volume,
                            color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                        }));
                        volumeSeries.setData(volumeData);
                        
                        mt5Dot.className = 'dot green';
                        mt5Text.innerText = 'IC Market Active';
                        
                        updateManualMarkers();
                    } 
                    else if (msg.type === 'candle') {
                        lastMarketTime = msg.data.time * 1000;
                        const localCandle = {...msg.data, time: msg.data.time - tzOffset};
                        candleSeries.update(localCandle);
                        
                        const existingIdx = allCandles.findIndex(c => c.time === msg.data.time);
                        if (existingIdx !== -1) {
                            allCandles[existingIdx] = {...msg.data};
                        } else {
                            allCandles.push({...msg.data});
                        }
                        
                        if (allCandles.length >= 200) {
                            let sum = 0;
                            for (let j = 0; j < 200; j++) {
                                sum += allCandles[allCandles.length - 1 - j].close;
                            }
                            smaSeries.update({ time: localCandle.time, value: sum / 200 });
                        }

                        volumeSeries.update({
                            time: localCandle.time,
                            value: msg.data.volume,
                            color: msg.data.close >= msg.data.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                        });
                        
                        updateManualMarkers();
                    }
                    else if (msg.type === 'manual_update') {
                        manualSetups = msg.data;
                        updateManualMarkers();
                    }
                    else if (msg.type === 'history_signals') {
                        const signals = msg.data;
                        for (let signal of signals) {
                            const isBuy = signal.direction === 'BUY';
                            const isWon = signal.status === 'WON';
                            const isLost = signal.status === 'LOST';
                            
                            signal.time -= tzOffset;
                            
                            let markerShape = isBuy ? 'arrowUp' : 'arrowDown';
                            let markerColor = isBuy ? '#26a69a' : '#ef5350';
                            
                            if (isWon) {
                                markerColor = '#4CAF50';
                            } else if (isLost) {
                                markerColor = '#FF5722';
                            }
                            
                            markers.push({
                                time: signal.time,
                                position: isBuy ? 'belowBar' : 'aboveBar',
                                color: markerColor,
                                shape: markerShape,
                                text: `${signal.direction} ${(signal.confidence * 100).toFixed(0)}%${isWon ? ' ✅' : isLost ? ' ❌' : ''}`,
                            });
                        }
                        markers.sort((a, b) => a.time - b.time);
                    }
                } catch(e) {
                    console.error("Message processing error:", e);
                }
            };

        } catch(e) {
            // Display error in the status panel
            const wsText = document.getElementById('ws-text');
            const mt5Text = document.getElementById('mt5-text');
            if (wsText) { wsText.innerText = 'JS Error'; document.getElementById('ws-dot').className = 'dot red'; }
            if (mt5Text) { mt5Text.innerText = e.message; document.getElementById('mt5-dot').className = 'dot red'; }
            console.error("FATAL:", e);
        }
    </script>
</body>
</html>
