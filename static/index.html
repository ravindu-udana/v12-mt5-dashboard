<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V10 MT5 Live Dashboard</title>
    <!-- Lightweight Charts CDN v3.8.0 -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar / AI Panel -->
        <aside class="ai-panel">
            <div class="logo">
                <span class="gradient-text">ANTIGRAVITY</span>
                <span class="version">V10 Live MT5 Data</span>
            </div>
            
            <div class="status-card">
                <h3>Connection Status</h3>
                <div class="status-indicator">
                    <span id="ws-dot" class="dot red"></span>
                    <span id="ws-text">Connecting...</span>
                </div>
                <div class="status-indicator">
                    <span id="mt5-dot" class="dot red"></span>
                    <span id="mt5-text">MT5 Stream Offline</span>
                </div>
            </div>

            <!-- Manual Engulfing Table -->
            <div class="status-card" style="margin-top:12px;">
                <h3>Manual Engulfings</h3>
                <table id="manual-table" style="width:100%; font-size:12px; color:#c8c8c8;">
                    <thead><tr><th style="text-align:left;padding:4px;">Time</th><th style="text-align:left;padding:4px;">Type</th><th style="text-align:left;padding:4px;">Price</th></tr></thead>
                    <tbody><tr class="empty-row"><td colspan="3" style="text-align:center; padding:10px; color:rgba(255,255,255,0.3);">Click candle to mark</td></tr></tbody>
                </table>
            </div>
        </aside>

        <!-- Main Chart Area -->
        <main class="chart-container">
            <header class="chart-header">
                <h2>XAUUSD (Gold) <span class="timeframe">1m</span></h2>
                <div class="header-right">
                    <div id="candle-countdown" class="countdown">00:00</div>
                    <div class="live-pulse">LIVE</div>
                </div>
            </header>
            <div id="tvchart"></div>
        </main>
    </div>

    <script>
        try {
            // 0. Countdown Timer
            const countdownEl = document.getElementById('candle-countdown');
            setInterval(() => {
                const now = new Date();
                const secondsLeft = 60 - now.getSeconds();
                const displaySecs = secondsLeft === 60 ? 0 : secondsLeft;
                countdownEl.innerText = `00:${displaySecs.toString().padStart(2, '0')}`;
            }, 1000);

            // 1. Initialize Chart
            const chartContainer = document.getElementById('tvchart');
            const chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: { background: { type: 'solid', color: '#0B0E14' }, textColor: '#d1d4dc', fontSize: 12, fontFamily: 'Inter' },
                grid: { vertLines: { color: 'rgba(42, 46, 57, 0.3)' }, horzLines: { color: 'rgba(42, 46, 57, 0.3)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(42, 46, 57, 0.5)' },
                timeScale: { borderColor: 'rgba(42, 46, 57, 0.5)', timeVisible: true, secondsVisible: false },
            });
            window.addEventListener('resize', () => { chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight }); });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderDownColor: '#ef5350', borderUpColor: '#26a69a',
                wickDownColor: '#ef5350', wickUpColor: '#26a69a',
            });

            const volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            const smaSeries = chart.addLineSeries({
                color: 'rgba(255, 193, 7, 0.8)', lineWidth: 2, title: '200 SMA',
                crosshairMarkerVisible: false, priceLineVisible: false
            });

            let markers = [];
            let allCandles = [];
            let manualSetups = [];
            let manualMarkers = [];
            const tzOffset = new Date().getTimezoneOffset() * 60;
            function toLocal(time) { return time - tzOffset; }

            // --- Manual Engulfing Functions ---
            function updateManualMarkers() {
                try {
                    if (!manualSetups.length || !allCandles.length) {
                        candleSeries.setMarkers([]);
                        manualMarkers = [];
                        updateManualTable([]);
                        return;
                    }
                    manualMarkers = manualSetups.map(m => {
                        const isBullish = m.c_close > m.c_open;
                        const entry = m.c_close;
                        let sl, tp;
                        if (isBullish) {
                            sl = m.b_low;
                            tp = entry + 2 * (entry - sl);
                        } else {
                            sl = m.b_high;
                            tp = entry - 2 * (sl - entry);
                        }
                        
                        let status = '';
                        const cIdx = allCandles.findIndex(c => c.time === m.c_time);
                        if (cIdx !== -1) {
                            for (let i = cIdx + 1; i < allCandles.length; i++) {
                                const cdl = allCandles[i];
                                if (isBullish) {
                                    if (cdl.low <= sl) { status = 'LOST'; break; }
                                    if (cdl.high >= tp) { status = 'WON'; break; }
                                } else {
                                    if (cdl.high >= sl) { status = 'LOST'; break; }
                                    if (cdl.low <= tp) { status = 'WON'; break; }
                                }
                            }
                        }
                        
                        let text = isBullish ? 'BUY' : 'SELL';
                        if (status === 'WON') text += ' ✅';
                        else if (status === 'LOST') text += ' ❌';
                        
                        return {
                            time: toLocal(m.c_time),
                            position: isBullish ? 'belowBar' : 'aboveBar',
                            color: '#FFD700',
                            shape: isBullish ? 'arrowUp' : 'arrowDown',
                            text: text,
                        };
                    });
                    
                    manualMarkers.sort((a, b) => a.time - b.time);
                    candleSeries.setMarkers(manualMarkers);
                    updateManualTable(manualSetups);
                } catch(e) {
                    console.error('updateManualMarkers error:', e);
                }
            }

            function updateManualTable(data) {
                const tbody = document.querySelector('#manual-table tbody');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="3" style="text-align:center; padding:10px; color:rgba(255,255,255,0.3);">Click candle to mark</td></tr>';
                } else {
                    tbody.innerHTML = '';
                    const sorted = [...data].sort((a,b) => b.c_time - a.c_time);
                    sorted.forEach(m => {
                        const isBullish = m.c_close > m.c_open;
                        const typeText = isBullish ? '<span style="color:#26a69a; font-weight:bold;">BULL</span>' : '<span style="color:#ef5350; font-weight:bold;">BEAR</span>';
                        const dateStr = new Date(m.c_time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        tbody.innerHTML += `
                            <tr style="border-bottom: 1px solid rgba(42, 46, 57, 0.5);">
                                <td style="padding: 6px 4px;">${dateStr}</td>
                                <td style="padding: 6px 4px;">${typeText}</td>
                                <td style="padding: 6px 4px;">${m.c_close.toFixed(2)}</td>
                            </tr>
                        `;
                    });
                }
            }

            function optimisticToggle(a, b, c) {
                if (ws.readyState === WebSocket.OPEN) {
                    const existingIdx = manualSetups.findIndex(m => m.c_time === c.time);
                    if (existingIdx !== -1) {
                        manualSetups.splice(existingIdx, 1);
                    } else {
                        manualSetups.push({
                            c_time: c.time, c_open: c.open, c_high: c.high, c_low: c.low, c_close: c.close,
                            b_time: b.time, b_open: b.open, b_high: b.high, b_low: b.low, b_close: b.close,
                            a_time: a.time, a_open: a.open, a_high: a.high, a_low: a.low, a_close: a.close
                        });
                    }
                    updateManualMarkers();
                    
                    ws.send(JSON.stringify({
                        type: 'toggle_manual',
                        data: { a, b, c }
                    }));
                }
            }

            chart.subscribeClick((param) => {
                if (!param.time) return;
                const dbTime = param.time + tzOffset;
                
                const cIdx = allCandles.findIndex(c => c.time === dbTime);
                if (cIdx >= 2) {
                    optimisticToggle(allCandles[cIdx-2], allCandles[cIdx-1], allCandles[cIdx]);
                }
            });

            // 2. WebSocket Connection
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);

            const wsDot = document.getElementById('ws-dot');
            const wsText = document.getElementById('ws-text');
            const mt5Dot = document.getElementById('mt5-dot');
            const mt5Text = document.getElementById('mt5-text');

            ws.onopen = () => {
                wsDot.className = 'dot green';
                wsText.innerText = 'Connected';
            };

            ws.onclose = () => {
                wsDot.className = 'dot red';
                wsText.innerText = 'Disconnected';
                mt5Dot.className = 'dot red';
                mt5Text.innerText = 'MT5 Stream Offline';
            };

            ws.onerror = (err) => {
                console.error("WS Error:", err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'history') {
                        const localHistory = msg.data.map(d => ({...d, time: d.time - tzOffset}));
                        candleSeries.setData(localHistory);
                        allCandles = msg.data.map(d => ({...d}));
                        
                        const smaData = [];
                        for (let i = 199; i < localHistory.length; i++) {
                            let sum = 0;
                            for (let j = 0; j < 200; j++) {
                                sum += localHistory[i - j].close;
                            }
                            smaData.push({ time: localHistory[i].time, value: sum / 200 });
                        }
                        smaSeries.setData(smaData);
                        
                        const volumeData = msg.data.map(d => ({
                            time: d.time - tzOffset,
                            value: d.volume,
                            color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                        }));
                        volumeSeries.setData(volumeData);
                        
                        mt5Dot.className = 'dot green';
                        mt5Text.innerText = 'IC Market Active';
                        
                        updateManualMarkers();
                    } 
                    else if (msg.type === 'candle') {
                        const localCandle = {...msg.data, time: msg.data.time - tzOffset};
                        candleSeries.update(localCandle);
                        
                        const existingIdx = allCandles.findIndex(c => c.time === msg.data.time);
                        if (existingIdx !== -1) {
                            allCandles[existingIdx] = {...msg.data};
                        } else {
                            allCandles.push({...msg.data});
                        }
                        
                        if (allCandles.length >= 200) {
                            let sum = 0;
                            for (let j = 0; j < 200; j++) {
                                sum += allCandles[allCandles.length - 1 - j].close;
                            }
                            smaSeries.update({ time: localCandle.time, value: sum / 200 });
                        }

                        volumeSeries.update({
                            time: localCandle.time,
                            value: msg.data.volume,
                            color: msg.data.close >= msg.data.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                        });
                        
                        updateManualMarkers();
                    }
                    else if (msg.type === 'manual_update') {
                        manualSetups = msg.data;
                        updateManualMarkers();
                    }
                    else if (msg.type === 'history_signals') {
                        const signals = msg.data;
                        for (let signal of signals) {
                            const isBuy = signal.direction === 'BUY';
                            const isWon = signal.status === 'WON';
                            const isLost = signal.status === 'LOST';
                            
                            signal.time -= tzOffset;
                            
                            let markerShape = isBuy ? 'arrowUp' : 'arrowDown';
                            let markerColor = isBuy ? '#26a69a' : '#ef5350';
                            
                            if (isWon) {
                                markerColor = '#4CAF50';
                            } else if (isLost) {
                                markerColor = '#FF5722';
                            }
                            
                            markers.push({
                                time: signal.time,
                                position: isBuy ? 'belowBar' : 'aboveBar',
                                color: markerColor,
                                shape: markerShape,
                                text: `${signal.direction} ${(signal.confidence * 100).toFixed(0)}%${isWon ? ' ✅' : isLost ? ' ❌' : ''}`,
                            });
                        }
                        markers.sort((a, b) => a.time - b.time);
                    }
                } catch(e) {
                    console.error("Message processing error:", e);
                }
            };

        } catch(e) {
            // Display error in the status panel
            const wsText = document.getElementById('ws-text');
            const mt5Text = document.getElementById('mt5-text');
            if (wsText) { wsText.innerText = 'JS Error'; document.getElementById('ws-dot').className = 'dot red'; }
            if (mt5Text) { mt5Text.innerText = e.message; document.getElementById('mt5-dot').className = 'dot red'; }
            console.error("FATAL:", e);
        }
    </script>
</body>
</html>
